<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Photo gallery of BCCI Bidar events, meetings, and activities. Browse our collection of memorable moments.">
  <title>Photo Gallery — BCCI Bidar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-white">
  <div id="site-header"></div>

  <!-- Page Banner -->
  <section class="page-banner">
    <div class="max-w-7xl mx-auto px-4 relative z-10">
      <span class="text-[#C9A84C] uppercase tracking-[3px] text-sm font-semibold">Our Memories</span>
      <h1 class="font-['Playfair_Display'] text-4xl md:text-5xl font-bold text-white mt-3">Photo Gallery</h1>
      <div class="flex items-center gap-2 mt-4 text-white/60 text-sm">
        <a href="index.html" class="hover:text-[#C9A84C]">Home</a>
        <span>/</span>
        <span class="text-[#C9A84C]">Gallery</span>
      </div>
    </div>
  </section>

  <!-- Gallery Grid -->
  <section class="py-20 bg-[#F5F7FA]">
    <div class="max-w-7xl mx-auto px-4">
      <div class="text-center mb-12">
        <span class="text-[#C9A84C] uppercase tracking-[3px] text-sm font-semibold">Browse</span>
        <h2 class="font-['Playfair_Display'] text-3xl md:text-4xl font-bold text-[#0B1F3A] mt-3 gold-underline">Event Highlights</h2>
      </div>
      <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 fade-in" id="galleryGrid"></div>
    </div>
  </section>

  
  <!-- Lightbox -->
  <div id="lightbox" class="lightbox"></div>

  <div id="site-footer"></div>

  <script src="content.js"></script>
  <script src="components.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const grid = document.getElementById('galleryGrid');
      SITE.gallery.photos.forEach((photo, i) => {
        grid.innerHTML += `
          <div class="gallery-item aspect-[3/2] rounded-xl shadow-md" onclick="openLightbox(SITE.gallery.photos, ${i})">
            <img src="${photo.image}" alt="${photo.caption}" class="w-full h-full object-cover rounded-xl">
          </div>`;
      });
    });
  </script>
</body>
</html>
