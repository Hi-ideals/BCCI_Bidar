<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Latest news and updates from Bidar Chamber of Commerce & Industry. Stay informed about business developments in Bidar.">
  <title>Latest News — BCCI Bidar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-white">
  <div id="site-header"></div>

  <!-- Page Banner -->
  <section class="page-banner">
    <div class="max-w-7xl mx-auto px-4 relative z-10">
      <span class="text-[#C9A84C] uppercase tracking-[3px] text-sm font-semibold">Latest Updates</span>
      <h1 class="font-['Playfair_Display'] text-4xl md:text-5xl font-bold text-white mt-3">News & Updates</h1>
      <div class="flex items-center gap-2 mt-4 text-white/60 text-sm">
        <a href="index.html" class="hover:text-[#C9A84C]">Home</a>
        <span>/</span>
        <span class="text-[#C9A84C]">News</span>
      </div>
    </div>
  </section>

  <!-- News Grid -->
  <section class="py-20 bg-[#F5F7FA]">
    <div class="max-w-7xl mx-auto px-4">
      <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-8 fade-in" id="newsGrid"></div>
    </div>
  </section>

  <!-- Lightbox -->
  <div id="lightbox" class="lightbox"></div>

  <div id="site-footer"></div>

  <script src="content.js"></script>
  <script src="components.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const grid = document.getElementById('newsGrid');
      SITE.news.forEach((n, i) => {
        grid.innerHTML += `
          <div class="news-card bg-white rounded-xl shadow-lg overflow-hidden cursor-pointer" onclick="openLightbox(SITE.news.map(x=>({image:x.image,caption:x.title})), ${i})">
            <img src="${n.image}" alt="${n.title}" class="w-full h-48 object-cover">
            <div class="p-6">
              <div class="flex items-center gap-2 text-xs text-[#C9A84C] font-semibold mb-2">
                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
                ${formatDate(n.date)}
              </div>
              <h3 class="font-['Playfair_Display'] font-bold text-[#0B1F3A] text-lg mb-3 line-clamp-2">${n.title}</h3>
              <a href="${n.link}" class="text-[#C9A84C] font-semibold text-sm hover:text-[#F0C060] transition-colors">Read More →</a>
            </div>
          </div>`;
      });
    });
  </script>
</body>
</html>
