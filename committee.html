<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Meet the Managing Committee of Bidar Chamber of Commerce & Industry - dedicated leaders driving business growth in Bidar.">
  <title>Managing Committee — BCCI Bidar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-white">
  <div id="site-header"></div>

  <!-- Page Banner -->
  <section class="page-banner">
    <div class="max-w-7xl mx-auto px-4 relative z-10">
      <span class="text-[#C9A84C] uppercase tracking-[3px] text-sm font-semibold">Our Team</span>
      <h1 class="font-['Playfair_Display'] text-4xl md:text-5xl font-bold text-white mt-3">Managing Committee</h1>
      <div class="flex items-center gap-2 mt-4 text-white/60 text-sm">
        <a href="index.html" class="hover:text-[#C9A84C]">Home</a>
        <span>/</span>
        <span class="text-[#C9A84C]">Managing Committee</span>
      </div>
    </div>
  </section>

  <!-- Office Bearers (Featured) -->
  <section class="py-20 bg-white">
    <div class="max-w-7xl mx-auto px-4 text-center">
      <span class="text-[#C9A84C] uppercase tracking-[3px] text-sm font-semibold">Leadership</span>
      <h2 class="font-['Playfair_Display'] text-3xl md:text-4xl font-bold text-[#0B1F3A] mt-3 mb-12 gold-underline">Office Bearers</h2>
      <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-6 fade-in" id="bearersGrid"></div>
    </div>
  </section>

  <!-- Full Managing Committee -->
  <section class="py-20 bg-[#F5F7FA]">
    <div class="max-w-7xl mx-auto px-4 text-center">
      <span class="text-[#C9A84C] uppercase tracking-[3px] text-sm font-semibold">Complete Team</span>
      <h2 class="font-['Playfair_Display'] text-3xl md:text-4xl font-bold text-[#0B1F3A] mt-3 mb-12 gold-underline">Managing Committee Members</h2>
      <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-8 fade-in" id="committeeGrid"></div>
    </div>
  </section>

  <div id="site-footer"></div>

  <script src="content.js"></script>
  <script src="components.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // Office Bearers
      const bearers = document.getElementById('bearersGrid');
      SITE.officeBearers.forEach(b => {
        bearers.innerHTML += `
          <div class="bearer-card bg-white rounded-xl p-5 shadow-md text-center">
            <img src="${b.image}" alt="${b.name}" class="w-24 h-24 rounded-full mx-auto bearer-avatar object-cover mb-3">
            <div class="font-semibold text-[#0B1F3A] text-sm">${b.name}</div>
            <div class="text-[#C9A84C] text-xs mt-1">${b.role}</div>
          </div>`;
      });

      // Full Committee
      const committee = document.getElementById('committeeGrid');
      SITE.managingCommittee.forEach(m => {
        committee.innerHTML += `
          <div class="bearer-card bg-white rounded-xl p-6 shadow-lg text-center">
            <img src="${m.image}" alt="${m.name}" class="w-28 h-28 rounded-full mx-auto bearer-avatar object-cover mb-4">
            <div class="font-bold text-[#0B1F3A]">${m.name}</div>
            <div class="text-[#C9A84C] text-sm mt-1">${m.role}</div>
          </div>`;
      });
    });
  </script>
</body>
</html>
