<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Upcoming and past events organized by Bidar Chamber of Commerce & Industry. Workshops, meetings, and business forums.">
  <title>Events — BCCI Bidar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="Highlights/BCCI%20logo.png" type="image/png">
</head>
<body class="bg-white">
  <div id="site-header"></div>

  <!-- Page Banner -->
  <section class="page-banner">
    <div class="max-w-7xl mx-auto px-4 relative z-10">
      <span class="text-[#C9A84C] uppercase tracking-[3px] text-sm font-semibold">What's Happening</span>
      <h1 class="font-['Playfair_Display'] text-4xl md:text-5xl font-bold text-white mt-3">Events</h1>
      <div class="flex items-center gap-2 mt-4 text-white/60 text-sm">
        <a href="index.html" class="hover:text-[#C9A84C]">Home</a>
        <span>/</span>
        <span class="text-[#C9A84C]">Events</span>
      </div>
    </div>
  </section>

  <!-- Events Listing -->
  <section class="py-20 bg-[var(--bg-light)]">
    <div class="max-w-7xl mx-auto px-4">
      <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-8 fade-in" id="eventsGrid"></div>
    </div>
  </section>

  <div id="site-footer"></div>

  <script src="content.js"></script>
  <script src="components.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const grid = document.getElementById('eventsGrid');
      SITE.events.forEach(e => {
        grid.innerHTML += `
          <div class="event-card bg-white rounded-xl shadow-lg overflow-hidden">
            <div class="relative overflow-hidden">
              <img src="${e.image}" alt="${e.title}" class="w-full h-52 object-cover transition-transform duration-300 hover:scale-105">
              <div class="event-date-badge">
                <span class="day">${getDay(e.date)}</span>
                <span class="month">${getMonth(e.date)}</span>
              </div>
            </div>
            <div class="p-6">
              <h3 class="font-['Playfair_Display'] font-bold text-[var(--secondary-color)] text-lg mb-3 line-clamp-2">${e.title}</h3>
              <div class="flex items-center gap-4 text-sm text-[#6B7280] mb-3">
                <span class="flex items-center gap-1">
                  <svg class="w-4 h-4 text-[#C9A84C]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/></svg>
                  ${e.location}
                </span>
                <span class="flex items-center gap-1">
                  <svg class="w-4 h-4 text-[#C9A84C]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
                  ${formatDate(e.date)}
                </span>
              </div>
              <p class="text-[#6B7280] text-sm leading-relaxed mb-4 line-clamp-3">${e.excerpt}</p>
              <a href="${e.link}" class="text-[#C9A84C] font-semibold text-sm hover:text-[#F0C060] transition-colors">Read More →</a>
            </div>
          </div>`;
      });
    });
  </script>
</body>
</html>
